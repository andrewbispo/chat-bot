<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Bot</title>
  <style>
    :root {
      --bg-color: #f0f2f5;
      --bot-bg: #ffffff;
      --user-bg: #007bff;
      --text-main: #333;
      --text-alt: #666;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg-color);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 80vh;
      background: white;
      display: flex;
      flex-direction: column;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      overflow: hidden;
    }

    header {
      padding: 20px;
      background: #fff;
      border-bottom: 1px solid #eee;
      font-weight: bold;
      font-size: 1.2rem;
      color: var(--user-bg);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      background: #f9f9f9;
    }

    /* Estilização das Mensagens */
    .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
      position: relative;
      word-wrap: break-word;
    }

    .user {
      align-self: flex-end;
      background: var(--user-bg);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .bot {
      align-self: flex-start;
      background: var(--bot-bg);
      color: var(--text-main);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }

    .msg small {
      display: block;
      font-size: 0.7rem;
      margin-top: 5px;
      opacity: 0.7;
      text-align: right;
    }

    /* Rodapé de Input */
    .input-area {
      padding: 15px;
      background: white;
      border-top: 1px solid #eee;
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px 15px;
      border: 1px solid #ddd;
      border-radius: 25px;
      outline: none;
      transition: border 0.3s;
    }

    input:focus {
      border-color: var(--user-bg);
    }

    button {
      background: var(--user-bg);
      color: white;
      border: none;
      padding: 0 20px;
      border-radius: 25px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.3s;
    }

    button:hover {
      background: #0056b3;
    }

    /* Efeito de Digitando */
    .typing {
      font-size: 0.85rem;
      color: var(--text-alt);
      font-style: italic;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>

  <div class="chat-container">
    <header>🤖Chat Bot</header>

    <div id="chat"></div>

    <div class="input-area">
      <input id="msg" placeholder="Envie uma mensagem..." autocomplete="off" onkeypress="handleEnter(event)" />
      <button onclick="send()">Enviar</button>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const input = document.getElementById("msg");

    function renderMessage(m) {
      const div = document.createElement("div");
      div.classList.add("msg", m.sender === 'user' ? 'user' : 'bot');

      div.innerHTML = `
    ${m.text}
    <small>${m.time || new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}</small>
  `;

      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    function handleEnter(e) {
      if (e.key === "Enter") send();
    }

    async function loadChat() {
      try {
        const res = await fetch("http://localhost:3000/chat");
        const data = await res.json();
        data.forEach(renderMessage);
      } catch (err) {
        console.error("Erro ao carregar chat:", err);
      }
    }

    async function send() {
      const message = input.value.trim();
      if (!message) return;

      input.value = "";

      // Feedback visual de carregamento
      const typing = document.createElement("div");
      typing.className = "typing";
      typing.innerText = "IA está processando...";
      chat.appendChild(typing);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch("http://localhost:3000/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message })
        });

        const data = await res.json();
        chat.removeChild(typing);

        renderMessage(data.userMsg);

        // Pequeno delay para a resposta parecer mais natural
        setTimeout(() => renderMessage(data.botMsg), 600);
      } catch (err) {
        chat.removeChild(typing);
        console.error("Erro ao enviar:", err);
      }
    }

    loadChat();
  </script>

</body>

</html>
